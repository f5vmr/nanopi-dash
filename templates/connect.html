<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SvxLink Reflector Connection</title>
    <link rel="stylesheet" href="{{ url_for('css_file', filename='site.css') }}">
</head>
<body>
    <main class="page">
        <section class="card">
            <h1>Reflector Connection</h1>
            <p>Do you wish to connect to <strong>north.america.svxlink.net</strong>?</p>
    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}
    <form action="/connect" method="post">
        <div class="option-group">
            <div class="radio-row">
                <input type="radio" id="yes" name="connect" value="yes" checked>
                <label for="yes">Yes, I will subscribe manually</label>
            </div>
            <div class="radio-row">
                <input type="radio" id="no" name="connect" value="no">
                <label for="no">No, continue without connecting</label>
            </div>
        </div>

        <div class="note">
            You must visit the following site yourself, subscribe, and obtain the password there.
        </div>
        <div class="note">
            <a href="https://north.america.svxlink.net" target="_blank">https://north.america.svxlink.net</a>
        </div>

        <div class="field-group">
            <label class="label" for="password">Subscription password (enter after subscribing):</label>
            <input class="input-field" type="text" id="password" name="password" placeholder="Enter 16-character password" maxlength="16" autocomplete="off">
        </div>

        <button class="button-primary" type="submit">Continue</button>
    </form>
</section>
</main>
</body>
</html>
